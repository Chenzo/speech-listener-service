<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stream Voice Triggers</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main>
      <div class="title-row">
        <h1>Stream Voice Triggers</h1>
        <div class="title-actions">
          <button id="start" type="button">Start</button>
          <button id="stop" type="button" hidden>Stop</button>
        </div>
      </div>

      <p id="status">Loading microphones...</p>

      <section id="settings-view">
        <label for="device">Microphone</label>
        <div class="device-row">
          <select id="device"></select>
          <button id="refresh" type="button">Refresh</button>
        </div>

        <label for="model-path">Vosk model</label>
        <div class="model-row">
          <input id="model-path" type="text" readonly placeholder="No model folder selected">
          <button id="choose-model" type="button">Choose</button>
        </div>

        <label for="port">WebSocket port</label>
        <input id="port" class="port-input" type="number" min="1" max="65535" step="1">

        <div class="trigger-heading">
          <label>Triggers</label>
          <button id="add-trigger" type="button">Add</button>
        </div>
        <div id="triggers"></div>
      </section>

      <section id="running-view" hidden>
        <pre id="log" aria-label="Stream Voice Triggers log"></pre>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
