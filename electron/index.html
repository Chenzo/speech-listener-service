<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Speech Listener</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main>
      <h1>Speech Listener</h1>

      <label for="device">Microphone</label>
      <div class="device-row">
        <select id="device"></select>
        <button id="refresh" type="button">Refresh</button>
      </div>

      <label for="model-path">Vosk model</label>
      <div class="model-row">
        <input id="model-path" type="text" readonly placeholder="No model folder selected">
        <button id="choose-model" type="button">Choose</button>
      </div>

      <div class="actions">
        <button id="start" type="button">Start</button>
        <button id="stop" type="button" disabled>Stop</button>
      </div>

      <p id="status">Loading microphones...</p>
      <pre id="log" aria-label="Listener log"></pre>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
